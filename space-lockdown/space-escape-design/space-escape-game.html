document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'e' || e.key === 'E' || e.key === ' ') {
    e.preventDefault();
    interactPressed = true;
  }
  // Prevent scrolling with arrows
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// ============================================================
//  SCENE RENDERING — Procedural pixel art for each scene
// ============================================================
function renderScene(id) {
  const s = spaceMap[id];
  if (!s) return;

  switch (id) {
    case 'SC-00': renderStartRoom(); break;
    case 'SC-01': renderDataCorridor(); break;
    case 'SC-02': renderVentDuct(); break;
    case 'SC-03': renderServerRoom(); break;
    case 'SC-04': renderAbandonedLab(); break;
    case 'SC-05': renderEnergyRoom(); break;
    case 'SC-06': renderControlCenter(); break;
    case 'SC-07': renderBioLab(); break;
    case 'SC-08': renderCoreHub(); break;
    case 'SC-09': renderDataCore(); break;
    case 'SC-10': renderFinalSpace(); break;
    default: renderFallback(); break;
  }
}

// ----- SC-00: Initial Room -----
function renderStartRoom() {
  // Dark gray room
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(0,0,W,H);
  // Floor
  ctx.fillStyle = '#222233';
  ctx.fillRect(0,400,W,80);
  for (let x=0; x<W; x+=16) {
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(x,400,16,2);
  }
  // Wall cracks (left)
  drawCrack(80,120,12,'#334');
  drawCrack(640,250,8,'#443');
  // Glowing fissures
  const glow = Math.sin(state.time*3)*0.3+0.7;
  ctx.fillStyle = `rgba(0,255,136,${glow*0.15})`;
  ctx.fillRect(70,110,40,80);
  ctx.fillStyle = `rgba(0,255,136,${glow*0.2})`;
  ctx.fillRect(630,240,30,60);
  // Ambient particles
  drawParticles('#00ff88',0.3);
  // Room outline
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 2;
  ctx.strokeRect(20,20,W-40,H-40);
}

// ----- SC-01: Data Corridor -----
function renderDataCorridor() {
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0,0,W,H);
  // Floor tiles
  ctx.fillStyle = '#1a1a30';
  ctx.fillRect(0,400,W,80);
  for (let x=0; x<W; x+=32) {
    ctx.fillStyle = '#222240';
    ctx.fillRect(x,400,30,3);
  }
  // Code waterfall walls
  for (let side=0; side<2; side++) {
    const bx = side === 0 ? 20 : W-60;
    for (let i=0; i<18; i++) {
      const cy = 30 + i * 22;
      const off = Math.sin(state.time*2+i*1.5)*0.5+0.5;
      if (off > 0.3) {
        ctx.fillStyle = `rgba(0,255,136,${off*0.15})`;
        ctx.fillRect(bx+4,cy,16,2);
        ctx.fillStyle = `rgba(0,255,200,${off*0.25})`;
        ctx.fillRect(bx+6,cy-2,8,1);
      }
    }
  }
  drawParticles('#00ff88',0.4);
}

  ctx.fillStyle = '#0f0f15';

//  PLAYER RENDERING
// ============================================================
function drawPlayer() {
  const px = Math.round(player.x - player.w/2);
  const py = Math.round(player.y - player.h);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px-1, py+player.h-2, player.w+2, 4);

  // Body
  ctx.fillStyle = '#44ccff';
  ctx.fillRect(px+2, py+8, 10, 10); // torso

  // Head
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(px+3, py+2, 8, 8); // head

  // Eyes
  ctx.fillStyle = '#222';
  if (player.dir === 0 || player.dir === 3) {
    ctx.fillRect(px+4, py+4, 2, 2);
    ctx.fillRect(px+8, py+4, 2, 2);
  } else if (player.dir === 1) {
    ctx.fillRect(px+4, py+4, 2, 2);
  } else {
    ctx.fillRect(px+8, py+4, 2, 2);
  }

  // Legs
  const legOff = player.moving ? Math.sin(player.animTimer*12)*2 : 0;
  ctx.fillStyle = '#2255aa';
  ctx.fillRect(px+2+legOff, py+18, 4, 6);
  ctx.fillRect(px+8-legOff, py+18, 4, 6);

  // Arms
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(px-2, py+10, 3, 6);
  ctx.fillRect(px+13, py+10, 3, 6);

  // Small backpack
  ctx.fillStyle = '#2255aa';
  ctx.fillRect(px+10, py+10, 4, 5);
}

// ============================================================
//  PORTAL NODES RENDERING
// ============================================================
function drawPortalNodes(sceneId) {
  const nodes = scenePortals[sceneId] || [];
  nodes.forEach(p => {
    const isLocked = p.req !== null && state.progress < p.req;
    const isNear = nearNode === p;
    const anim = Math.sin(state.time*3)*0.15+0.85;

    // Glow circle
    ctx.save();
    ctx.translate(p.px, p.py);

    // Outer glow
    const glowSize = isNear ? 28 : 20;
    const grad = ctx.createRadialGradient(0,0,2,0,0,glowSize);
    if (isLocked) {
      grad.addColorStop(0, `rgba(255,200,0,${anim*0.3})`);
      grad.addColorStop(1, 'rgba(255,200,0,0)');
    } else {
      const col = p.delta > 0 ? '0,255,136' : (p.delta < 0 ? '255,107,157' : '136,136,170');
      grad.addColorStop(0, `rgba(${col},${anim*0.4})`);
      grad.addColorStop(1, `rgba(${col},0)`);
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0,0,glowSize,0,Math.PI*2);
    ctx.fill();

    // Portal ring
    ctx.strokeStyle = isLocked ? `rgba(255,200,0,${anim*0.8})` : (p.delta > 0 ? `rgba(0,255,136,${anim})` : (p.delta < 0 ? `rgba(255,107,157,${anim})` : `rgba(136,136,170,${anim})`));
    ctx.lineWidth = isNear ? 3 : 2;
    ctx.beginPath();
    ctx.arc(0,0,12,0,Math.PI*2);
    ctx.stroke();

    // Inner portal
    ctx.fillStyle = isLocked ? `rgba(255,200,0,${anim*0.2})` : (p.delta > 0 ? `rgba(0,255,136,${anim*0.15})` : (p.delta < 0 ? `rgba(255,107,157,${anim*0.15})` : `rgba(136,136,170,${anim*0.15})`));
    ctx.beginPath();
    ctx.arc(0,0,8,0,Math.PI*2);
    ctx.fill();

    // Icon
    ctx.fillStyle = isLocked ? '#ffcc00' : (p.delta > 0 ? '#00ff88' : (p.delta < 0 ? '#ff6b9d' : '#8888aa'));
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(isLocked ? '🔒' : '◎', 0, 1);

    ctx.restore();

    // Lock badge if locked
    if (isLocked) {
      ctx.fillStyle = '#ffcc00';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('需求进度≥'+p.req, p.px, p.py+26);
    }
  });
}

// ============================================================
//  GAME UPDATE
// ============================================================
function update(dt) {
  state.time += dt;

  if (state.screen !== 'playing') return;

  if (state.toastTimer > 0) {
    state.toastTimer -= dt;
    if (state.toastTimer <= 0) {
      sceneToast.classList.remove('visible');
    }
    return; // Can't move during toast
  }

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;

  player.moving = dx !== 0 || dy !== 0;

  if (dx !== 0 && dy !== 0) {
    dx *= 0.707; dy *= 0.707; // diagonal normalization
  }

  const moveAmount = player.speed * dt;
  let nx = player.x + dx * moveAmount;
  let ny = player.y + dy * moveAmount;

  // Bounds
  nx = Math.max(20, Math.min(W-20, nx));
  ny = Math.max(60, Math.min(H-20, ny));
  player.x = nx;
  player.y = ny;

  // Direction
  if (dx < 0) player.dir = 1;
  else if (dx > 0) player.dir = 2;
  else if (dy < 0) player.dir = 3;
  else if (dy > 0) player.dir = 0;

  // Animation
  if (player.moving) {
    player.animTimer += dt;
  } else {
    player.animTimer = 0;
  }

  // Check proximity to nodes
  const nodes = scenePortals[state.sceneId] || [];
  let closestNode = null;
  let closestDist = Infinity;
  let now = Date.now();

  nodes.forEach(p => {
    const dist = Math.sqrt((player.x - p.px)**2 + (player.y - p.py)**2);
    if (dist < 45 && dist < closestDist &&
        !(p.req !== null && state.progress < p.req)) {
      closestDist = dist;
      closestNode = p;
    }
  });

  // Even if locked, show hint if close enough
  nodes.forEach(p => {
    const dist = Math.sqrt((player.x - p.px)**2 + (player.y - p.py)**2);
    if (dist < 45 && (p.req !== null && state.progress < p.req)) {
      if (closestNode === null || dist < closestDist) {
        closestNode = p;
      }
    }
  });

  nearNode = closestNode;

  // Update hint box
  if (nearNode) {
    hintText.textContent = nearNode.hint;
    hintDelta.textContent = '';
    hintDelta.className = '';
    hintLocked.textContent = '';

    const isLocked = nearNode.req !== null && state.progress < nearNode.req;

    if (isLocked) {
      hintLocked.textContent = `🔒 需求逃离进度 ≥ ${nearNode.req}`;
      hintDelta.className = 'neutral';
      hintDelta.textContent = '（条件不足，无法使用）';
    } else {
      if (nearNode.delta > 0) {
        hintDelta.className = 'positive';
        hintDelta.textContent = `↑ 逃离进度 +${nearNode.delta}`;
      } else if (nearNode.delta < 0) {
        hintDelta.className = 'negative';
        hintDelta.textContent = `↓ 逃离进度 ${nearNode.delta}`;
      } else {
        hintDelta.className = 'neutral';
        hintDelta.textContent = '− 进度不变';
      }
    }
    hintBox.classList.add('visible');
  } else {
    hintBox.classList.remove('visible');
  }

  // Handle interact
  if (interactPressed && nearNode) {
    interactPressed = false;
    const isLocked = nearNode.req !== null && state.progress < nearNode.req;
    if (!isLocked) {
      triggerTeleport(nearNode);
    }
  }
}

// ============================================================
//  TELEPORT
// ============================================================
function triggerTeleport(portal) {
  state.screen = 'transitioning';

  // Fade out
  transitionOverlay.classList.add('active');

  setTimeout(() => {
    // Update state
    state.sceneId = portal.tgt;
    state.progress = Math.max(0, Math.min(state.maxProgress, state.progress + portal.delta));
    state.steps++;
    state.visited.add(portal.tgt);

    // Reset player position
    player.x = 400;
    player.y = 380;

    // Check win
    const targetSpace = spaceMap[portal.tgt];
    if (targetSpace && targetSpace.type === 'final') {
      state.screen = 'win';
      transitionOverlay.classList.remove('active');
      hudEl.classList.remove('visible');
      showWinScreen();
      return;
    }

    // Update HUD
    updateHUD();

    // Show scene toast
    showSceneToast(targetSpace);

    // Fade in
    transitionOverlay.classList.remove('active');

    state.screen = 'playing';
  }, 400);
}

// ============================================================
//  HUD UPDATE
// ============================================================
function updateHUD() {
  const space = spaceMap[state.sceneId];
  sceneNameEl.textContent = space ? space.name : '???';
  const pct = (state.progress / state.maxProgress) * 100;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${state.progress} / ${state.maxProgress}`;

  // Color
  if (state.progress >= 8) progressFill.style.background = '#ffcc00';
  else if (state.progress >= 5) progressFill.style.background = '#00ff88';
  else if (state.progress >= 3) progressFill.style.background = '#ffcc00';
  else progressFill.style.background = '#ff4444';

  stepCountEl.textContent = `传送: ${state.steps} 次`;
}

// ============================================================
//  SCENE TOAST
// ============================================================
function showSceneToast(space) {
  toastTitle.textContent = space.name;
  toastDesc.textContent = space.desc;
  sceneToast.classList.add('visible');
  state.toastTimer = 3.5;
}

// ============================================================
//  WIN SCREEN
// ============================================================
function showWinScreen() {
  winStats.innerHTML = `
    传送次数: <span>${state.steps}</span> 次<br>
    最终进度: <span>${state.progress}/${state.maxProgress}</span><br>
    探索空间: <span>${state.visited.size}</span> / 11
  `;
  winScreen.classList.add('visible');
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  ctx.clearRect(0,0,W,H);

  if (state.screen === 'start') {
    // Decorative background for start screen
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0,0,W,H);
    drawParticles('#00ff88', 0.5);
    drawParticles('#7b61ff', 0.3);
    return;
  }

  if (state.screen === 'win') {
    // Show final space background
    renderScene('SC-10');
    return;
  }

  // Playing / transitioning
  renderScene(state.sceneId);
  drawPortalNodes(state.sceneId);
  drawPlayer();
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// ============================================================
//  GAME CONTROL FUNCTIONS (exposed to HTML)
// ============================================================
function startGame() {
  state.screen = 'playing';
  state.sceneId = 'SC-00';
  state.progress = 0;
  state.steps = 0;
  state.visited = new Set(['SC-00']);
  state.toastTimer = 0;
  player.x = 400;
  player.y = 380;

  startScreen.style.display = 'none';
  hudEl.classList.add('visible');
  updateHUD();

  // Show initial scene toast
  showSceneToast(spaceMap['SC-00']);
}

function restartGame() {
  winScreen.classList.remove('visible');
  hudEl.classList.remove('visible');
  startScreen.style.display = 'flex';
  state.screen = 'start';
  state.progress = 0;
  state.steps = 0;
  state.visited = new Set();
  state.sceneId = 'SC-00';
  player.x = 400;
  player.y = 380;
  sceneToast.classList.remove('visible');
  transitionOverlay.classList.remove('active');
}

// ============================================================
//  INIT — Handle canvas resize
// ============================================================
function resizeCanvas() {
  const wrapper = document.getElementById('game-wrapper');
  const rect = wrapper.getBoundingClientRect();
  // Canvas element already sized by CSS
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Fix for interact button at start
document.addEventListener('keydown', function handleFirstInteract(e) {
  if ((e.key === 'e' || e.key === 'E' || e.key === 'Enter') && state.screen === 'start') {
    // handled by startGame via button
  }
});

// Start the loop
requestAnimationFrame(gameLoop);

// Ensure start screen is shown
startScreen.style.display = 'flex';
</script>
</body>
